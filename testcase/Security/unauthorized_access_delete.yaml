# 未授权访问安全测试用例 - 删除用户接口
# 验证接口在未授权情况下的访问控制能力

- baseInfo:
    api_name: 删除用户-未授权访问
    url: /dar/user/deleteUser
    method: POST
    header:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
  testCase:
    - case_name: 未授权-越权删除其他用户
      data:
        user_id: '213457889904300192'
      validation:
        - contains: { 'msg': '删除成功' }

    - case_name: 未授权-删除不存在用户
      data:
        user_id: '0000000000000000000'
      validation:
        - contains: { 'msg': '删除失败' }
