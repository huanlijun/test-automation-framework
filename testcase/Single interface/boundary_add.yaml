- baseInfo:
    api_name: 新增用户-边界与反向测试
    url: /dar/user/addUser
    method: POST
    header:
      Content-Type: application/x-www-form-urlencoded;charset=UTF-8
  testCase:
    - case_name: 边界测试-手机号不足11位
      data:
        username: testuser
        password: test123456
        role_id: 123456789
        dates: '2024-01-01'
        phone: '1380000'
        token: ${get_extract_data(token)}
      validation:
        - contains: { 'msg': '新增失败' }

    - case_name: 边界测试-手机号超过11位
      data:
        username: testuser
        password: test123456
        role_id: 123456789
        dates: '2024-01-01'
        phone: '138000000001234'
        token: ${get_extract_data(token)}
      validation:
        - contains: { 'msg': '新增失败' }

    - case_name: 边界测试-日期格式错误
      data:
        username: testuser
        password: test123456
        role_id: 123456789
        dates: '20240101'
        phone: '13800000000'
        token: ${get_extract_data(token)}
      validation:
        - contains: { 'msg': '新增失败' }

    - case_name: 边界测试-用户名超长（256字符）
      data:
        username: 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa'
        password: test123456
        role_id: 123456789
        dates: '2024-01-01'
        phone: '13800000000'
        token: ${get_extract_data(token)}
      validation:
        - contains: { 'msg': '新增失败' }

    - case_name: 反向测试-密码为空
      data:
        username: testuser
        password: ''
        role_id: 123456789
        dates: '2024-01-01'
        phone: '13800000000'
        token: ${get_extract_data(token)}
      validation:
        - contains: { 'msg': '新增失败' }
